<div class="mx-auto mt-6 grid grid-cols-1 gap-6 lg:grid-cols-[220px_1fr_320px] max-w-6xl">
  <!-- Categories -->
  <aside class="rounded-2xl border border-slate-200 bg-white p-4">
    <h2 class="text-sm font-semibold text-slate-900 mb-3">Categories</h2>
    <div class="flex flex-col gap-3">
      @for (cat of categories; track cat.name) {
        <app-category [cat]="cat"></app-category>  
      }
    </div>
  </aside>

  <!-- Center -->
  <section class="min-w-0">
    <div class="mt-4">
      <app-carousel
        [autoplayInterval]="3000"
        [circular]="false"
        [numVisible]="2"
      ></app-carousel>
    </div>
    <div class="mt-4 grid grid-cols-1 sm:grid-cols-4 gap-4 ">
      @for(item of items; track item.id) {
        <app-card-box [item]="item"></app-card-box>
      }
    </div>
  </section>

  <!-- Cart -->
  <aside class="rounded-2xl border border-slate-200 bg-white p-4">
    <div class="flex items-start justify-between gap-3 mb-4">
      <div>
        <div class="text-sm font-semibold text-slate-900">
          Current Order/Order Now
        </div>
      </div>
      <button type="button" class="text-slate-500 hover:text-slate-900 text-lg leading-none" aria-label="Close">
        ×
      </button>
    </div>

    <div class="space-y-3">
      @for (item of cartItems; track item.name) {
        <div class="flex items-center justify-between gap-3">
          <div class="min-w-0">
            <div class="text-sm font-medium text-slate-900 truncate">{{ item.name }}</div>
            <div class="text-xs text-slate-500">${{ item.price.toFixed(2) }}</div>
          </div>
          <div class="flex items-center gap-3">
            <button type="button" class="w-7 h-7 rounded-full border border-slate-200 text-slate-500 hover:bg-slate-50">
              ×
            </button>
            <div class="text-sm font-semibold text-slate-900">
              {{ item.qty }}
            </div>
          </div>
        </div>
      }
    </div>

    <div class="mt-5 border-t border-slate-200 pt-4 flex items-center justify-between">
      <span class="text-sm font-semibold text-slate-900">Total</span>
      <span class="text-lg font-bold text-slate-900">
        ${{ totalPrice.toFixed(2) }}
      </span>
    </div>

    <button
      type="button"
      class="mt-4 w-full rounded-full bg-slate-900 text-white py-2.5 font-semibold hover:bg-slate-800"
    >
      Finalize Order
    </button>
  </aside>
</div>
