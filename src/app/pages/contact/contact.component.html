<section class="space-y-4">
  <div class="space-y-2">
    <h1 class="text-3xl font-semibold tracking-tight">Contact</h1>
    <p class="text-slate-600">Send us a message.</p>
  </div>

  <form class="grid max-w-lg gap-3">
    <label class="grid gap-1 text-sm font-medium">
      <span>Name</span>
      <input
        class="h-10 rounded-xl border border-slate-200 px-3 outline-none focus:ring-2 focus:ring-emerald-500"
        type="text"
        name="name"
        autocomplete="name"
      />
    </label>

    <label class="grid gap-1 text-sm font-medium">
      <span>Email</span>
      <input
        class="h-10 rounded-xl border border-slate-200 px-3 outline-none focus:ring-2 focus:ring-emerald-500"
        type="email"
        name="email"
        autocomplete="email"
      />
    </label>

    <label class="grid gap-1 text-sm font-medium">
      <span>Message</span>
      <textarea
        class="min-h-28 resize-y rounded-xl border border-slate-200 px-3 py-2 outline-none focus:ring-2 focus:ring-emerald-500"
        name="message"
      ></textarea>
    </label>

    <button
      class="inline-flex h-10 items-center justify-center rounded-xl bg-emerald-600 px-4 text-sm font-semibold text-white transition hover:bg-emerald-700 focus:outline-none focus-visible:ring-2 focus-visible:ring-emerald-500 focus-visible:ring-offset-2"
      type="button"
    >
      Submit
    </button>
  </form>
</section>
