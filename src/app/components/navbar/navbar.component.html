<header class="border-b border-slate-200 bg-white/80 backdrop-blur p-3">
  <div class="mx-auto flex h-16 max-w-6xl flex-wrap  justify-between gap-3">
    <a
      class="flex items-center gap-2 font-semibold tracking-tight text-slate-900"
      routerLink="/"
    >
      <img
        src="https://static.vecteezy.com/system/resources/thumbnails/008/522/485/small/drink-cup-soft-drink-logo-design-vector.jpg"
        alt="Beverage World"
        class="h-16 w-16"
      />
      <span class="hidden sm:inline">Drinks Shop</span>
    </a>

    <nav class="hidden items-center gap-8 text-md font-medium sm:flex">
      <a routerLink="/home" routerLinkActive="is-active" class="nav-link">Home</a>
      <a routerLink="/about" routerLinkActive="is-active" class="nav-link">About</a>
      <a routerLink="/drinks" routerLinkActive="is-active" class="nav-link">Drinks</a>
      <a routerLink="/contact" routerLinkActive="is-active" class="nav-link">Contact</a>
    </nav>

    <div class="flex min-w-0 flex-1 items-center justify-end gap-3 sm:flex-initial">
      <input
        type="text"
        placeholder="Search"
        class="min-w-0 max-w-[200px] flex-1 rounded-full border-2 border-emerald-500 px-4 py-2 text-sm text-black shadow-sm outline-none transition sm:max-w-none sm:flex-none"
      />

      <div class="profile-menu-root" #profileMenuRoot>
        <button
          type="button"
          class="profile-trigger"
          [class.profile-trigger--open]="profileMenuOpen"
          aria-haspopup="menu"
          [attr.aria-expanded]="profileMenuOpen"
          aria-controls="profile-dropdown-menu"
          aria-label="Profile menu"
          id="profile-menu-button"
          (click)="toggleProfileMenu($event)"
        >
          <span class="profile-trigger__avatar">
            <img
              src="https://i.pravatar.cc/80?img=47"
              alt=""
              width="36"
              height="36"
            />
          </span>
          <span class="profile-trigger__label">
            <span class="profile-trigger__greeting">Hello.</span>
            <svg
              class="profile-trigger__chevron"
              viewBox="0 0 20 20"
              fill="currentColor"
              aria-hidden="true"
            >
              <path
                fill-rule="evenodd"
                d="M5.23 7.21a.75.75 0 011.06.02L10 11.168l3.71-3.938a.75.75 0 111.08 1.04l-4.25 4.5a.75.75 0 01-1.08 0l-4.25-4.5a.75.75 0 01.02-1.06z"
                clip-rule="evenodd"
              />
            </svg>
          </span>
        </button>

        @if (profileMenuOpen) {
          <div
            class="profile-dropdown"
            id="profile-dropdown-menu"
            role="menu"
            aria-labelledby="profile-menu-button"
          >
            <a
              routerLink="/home"
              role="menuitem"
              class="profile-dropdown__item"
              (click)="closeProfileMenu()"
            >
              My account
            </a>
            <a
              routerLink="/drinks"
              role="menuitem"
              class="profile-dropdown__item"
              (click)="closeProfileMenu()"
            >
              Orders
            </a>
            <a
              routerLink="/contact"
              role="menuitem"
              class="profile-dropdown__item"
              (click)="closeProfileMenu()"
            >
              Help
            </a>
            <button
              type="button"
              role="menuitem"
              class="profile-dropdown__item profile-dropdown__item--button"
              (click)="closeProfileMenu()"
            >
              Sign out
            </button>
          </div>
        }
      </div>
    </div>
  </div>
</header>
