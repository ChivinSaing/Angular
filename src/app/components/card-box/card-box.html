<div class="product-card">
  <div class="product-card__media ">
    <!-- <img class="product-card__img" [src]="item.imageUrl" [alt]="item.name" /> -->
    <img
      class="product-card__img w-full rounded-t-xl bg-transparent"
      [src]="item.imageUrl"
      [alt]="item.name"
    />
  </div>

  <div class="product-card__name">{{ item.name }}</div>

  <div class="product-card__footer">
    <span class="product-card__price">${{ item.price }}</span>

    <div class="product-card__size-list">
      @for (size of item.size; track size) {
        <span class="size-circle">
          {{ size }}
        </span>
      }
    </div>
  </div>

  <button type="button" class="product-card__order-btn" (click)="AddbuttonClicked()">Add to Order</button>
</div>
